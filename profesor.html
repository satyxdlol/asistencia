<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistencia — Profesor</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--bg:#0f0f11;--surface:#18181c;--s2:#222228;--border:#2e2e38;--accent:#e8ff47;--a2:#47ffe8;--text:#f0f0f0;--muted:#666;--red:#ff4757;--green:#2ecc71;--r:10px;--font:'Syne',sans-serif;--mono:'DM Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;gap:1rem}
header h1{font-size:.93rem;font-weight:800;letter-spacing:.05em;text-transform:uppercase;white-space:nowrap}
header h1 span{color:var(--accent)}
.hdr-r{display:flex;align-items:center;gap:.5rem}
.bdg{font-family:var(--mono);font-size:.67rem;padding:.22rem .7rem;border-radius:20px;border:1px solid var(--border);color:var(--muted);white-space:nowrap;transition:all .3s}
.bdg.ok{color:var(--green);border-color:rgba(46,204,113,.3);background:rgba(46,204,113,.07)}
.bdg.err{color:var(--red);border-color:rgba(255,71,87,.3);background:rgba(255,71,87,.07)}
.bdg.loading{color:var(--accent);border-color:rgba(232,255,71,.28);background:rgba(232,255,71,.05)}
.bdg.demo{color:#c8d97a;border-color:rgba(232,255,71,.25);background:rgba(232,255,71,.06)}
main{padding:2rem;max-width:940px;margin:0 auto}
.sec-title{font-size:1.3rem;font-weight:800;margin-bottom:1.2rem}
.sec-title span{color:var(--accent)}
.stats{display:flex;gap:.7rem;margin-bottom:1.2rem;flex-wrap:wrap}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:.7rem 1.2rem;flex:1;min-width:90px}
.stat .v{font-size:1.5rem;font-weight:800;line-height:1}
.stat .l{font-family:var(--mono);font-size:.62rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-top:.2rem}
.stat.g .v{color:var(--green)}.stat.r .v{color:var(--red)}.stat.y .v{color:var(--accent)}
.info-box{background:rgba(232,255,71,.05);border:1px solid rgba(232,255,71,.18);border-radius:var(--r);padding:.85rem 1.1rem;margin-bottom:1rem;font-size:.82rem;color:#c8d97a;line-height:1.6;display:none}
.err-box{background:rgba(255,71,87,.07);border:1px solid rgba(255,71,87,.2);border-radius:var(--r);padding:.85rem 1.1rem;margin-bottom:1rem;font-size:.83rem;color:var(--red);display:none;line-height:1.6}
.add-form{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.2rem 1.4rem;display:flex;gap:.65rem;flex-wrap:wrap;align-items:flex-end;margin-bottom:.8rem}
.f{display:flex;flex-direction:column;gap:.35rem;flex:1;min-width:130px}
.f label{font-family:var(--mono);font-size:.63rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.f input{background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--font);font-size:.88rem;padding:.5rem .82rem;outline:none;transition:border-color .18s}
.f input:focus{border-color:var(--accent)}
.act{display:flex;gap:.55rem;flex-wrap:wrap;align-items:center;margin-bottom:.85rem}
.btn{display:inline-flex;align-items:center;gap:.38rem;padding:.48rem 1rem;border-radius:var(--r);border:none;font-family:var(--font);font-size:.79rem;font-weight:700;cursor:pointer;transition:all .15s;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
.ba{background:var(--accent);color:#000}.ba:hover{background:#cfe02f}
.bg{background:var(--s2);color:var(--text);border:1px solid var(--border)}.bg:hover{background:var(--border)}
.bt{background:rgba(71,255,232,.1);color:var(--a2);border:1px solid rgba(71,255,232,.2)}.bt:hover{background:rgba(71,255,232,.18)}
.bd{background:rgba(255,71,87,.08);color:var(--red);border:1px solid rgba(255,71,87,.18)}.bd:hover{background:rgba(255,71,87,.15)}
.bsm{padding:.3rem .65rem;font-size:.72rem}
.tw{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:auto;margin-bottom:1.2rem}
table{width:100%;border-collapse:collapse;min-width:520px}
thead tr{background:var(--s2);border-bottom:1px solid var(--border)}
th{font-family:var(--mono);font-size:.63rem;font-weight:500;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);padding:.78rem 1rem;text-align:left;white-space:nowrap}
td{padding:.7rem 1rem;font-size:.87rem;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--text)}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:rgba(255,255,255,.025)}
.pb{display:inline-block;padding:.18rem .6rem;border-radius:20px;font-family:var(--mono);font-size:.68rem;font-weight:500}
.pb.presente{background:rgba(46,204,113,.12);color:var(--green);border:1px solid rgba(46,204,113,.25)}
.pb.ausente{background:rgba(255,71,87,.07);color:var(--red);border:1px solid rgba(255,71,87,.18)}
.hc{font-family:var(--mono);font-size:.78rem;color:var(--a2)}
.empty{text-align:center;padding:2.5rem;color:var(--muted);font-size:.88rem;line-height:1.7}
.dz{margin-top:1.2rem;border-top:1px solid var(--border);padding-top:1.1rem;display:flex;align-items:center;gap:.85rem;flex-wrap:wrap}
.dz small{color:var(--muted);font-size:.75rem}
@media(max-width:600px){header{padding:0 1rem}main{padding:1rem}.add-form{flex-direction:column}}
</style>
</head>
<body>
<header>
  <h1>Asistencia <span>//</span> Profesor</h1>
  <div class="hdr-r">
    <span class="bdg demo" id="sync-badge">Modo demo</span>
    <button class="btn bg bsm" onclick="cargar()">↺ Actualizar</button>
  </div>
</header>

<main>
  <p class="sec-title">Panel <span>Profesor</span></p>

  <div class="stats">
    <div class="stat y"><div class="v" id="s-t">0</div><div class="l">Total</div></div>
    <div class="stat g"><div class="v" id="s-p">0</div><div class="l">Presentes</div></div>
    <div class="stat r"><div class="v" id="s-a">0</div><div class="l">Ausentes</div></div>
  </div>

  <div class="info-box" id="info-box"></div>
  <div class="err-box"  id="err-box"></div>

  <div class="add-form">
    <div class="f"><label>Apellido/s</label><input type="text" id="new-ap" placeholder="García López"></div>
    <div class="f"><label>Nombre/s</label><input type="text" id="new-nm" placeholder="Juan Carlos"></div>
    <div class="f" style="max-width:158px"><label>DNI</label><input type="text" id="new-dn" placeholder="12345678" maxlength="11"></div>
    <button class="btn ba" onclick="agregarAlumno()">+ Agregar</button>
  </div>

  <div class="act">
    <button class="btn bg" onclick="resetearAsistencia()">↺ Resetear asistencia</button>
    <button class="btn ba" onclick="descargarPDF()">↓ PDF</button>
    <button class="btn bt" onclick="descargarExcel()">↓ Excel</button>
  </div>

  <div class="tw">
    <table>
      <thead><tr><th>#</th><th>Apellido/s</th><th>Nombre/s</th><th>DNI</th><th>Estado</th><th>Hora</th><th></th></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="dz">
    <button class="btn bd bsm" onclick="borrarTodos()">✕ Borrar todos los alumnos</button>
    <small>Elimina el listado completo. No se puede deshacer.</small>
  </div>
</main>

<script>
// ═══════════════════════════════════════════════════
//  DATOS DE PRUEBA — visibles sin servidor
//  Al conectar con Python estos se reemplazan solos
// ═══════════════════════════════════════════════════
const DEMO = [
  {apellido:"González",  nombre:"María Belén",    dni:"40123456", presente:true,  hora:"08:15"},
  {apellido:"Rodríguez", nombre:"Lucas Ezequiel",  dni:"41234567", presente:false, hora:null},
  {apellido:"Martínez",  nombre:"Sofía Valentina", dni:"39876543", presente:true,  hora:"08:22"},
  {apellido:"López",     nombre:"Tomás Agustín",   dni:"42001122", presente:false, hora:null},
  {apellido:"Pérez",     nombre:"Camila Rocío",    dni:"43112233", presente:false, hora:null},
  {apellido:"Díaz",      nombre:"Fernando Matías", dni:"44332211", presente:true,  hora:"08:30"},
];

let alumnos  = [];
let modoDemo = true;
let intentos = 0;

function badge(s,m){const b=document.getElementById("sync-badge");b.textContent=m;b.className="bdg "+s}
function infoBox(m){const e=document.getElementById("info-box");if(m){e.innerHTML=m;e.style.display="block"}else e.style.display="none"}
function errBox(m){const e=document.getElementById("err-box");if(m){e.innerHTML=m;e.style.display="block"}else e.style.display="none"}

// ── Intenta conectar al servidor Python ───────────
async function cargar() {
  try {
    badge("loading","Conectando…");
    const r   = await fetch("/api/alumnos", {signal: AbortSignal.timeout(3000)});
    const data = await r.json();
    if (data.error) { badge("err","Error: "+data.error); errBox(data.error); return; }
    alumnos  = Array.isArray(data) ? data : [];
    modoDemo = false;
    badge("ok","Conectado ✓");
    infoBox(null); errBox(null);
    render();
  } catch(e) {
    // Sin servidor → modo demo
    if (modoDemo && alumnos.length === 0) {
      alumnos = JSON.parse(JSON.stringify(DEMO));
    }
    modoDemo = true;
    badge("demo","Sin servidor — demo");
    infoBox("⚡ El servidor Python no está corriendo. Estás viendo datos de prueba.<br>" +
            "Para usar en clase: ejecutá <strong>servidor.py</strong> y recargá esta página.");
    errBox(null);
    render();
  }
}

// ── Render ────────────────────────────────────────
function render() {
  const tb = document.getElementById("tbody");
  if (!alumnos.length) {
    tb.innerHTML = '<tr><td colspan="7" class="empty">Sin alumnos. Usá el formulario para agregar.</td></tr>';
  } else {
    tb.innerHTML = alumnos.map((a,i) => `<tr>
      <td style="color:var(--muted);font-family:var(--mono);font-size:.74rem">${i+1}</td>
      <td><strong>${esc(a.apellido)}</strong></td>
      <td>${esc(a.nombre)}</td>
      <td style="font-family:var(--mono);font-size:.77rem;color:#999">${esc(a.dni)}</td>
      <td><span class="pb ${a.presente?'presente':'ausente'}">${a.presente?'Presente':'Ausente'}</span></td>
      <td class="hc">${a.hora||'—'}</td>
      <td style="text-align:right"><button class="btn bd bsm" onclick="eliminarAlumno(${i})">Eliminar</button></td>
    </tr>`).join('');
  }
  const p = alumnos.filter(a=>a.presente).length;
  document.getElementById("s-t").textContent = alumnos.length;
  document.getElementById("s-p").textContent = p;
  document.getElementById("s-a").textContent = alumnos.length - p;
}

// ── API helper ────────────────────────────────────
async function api(path, method="GET", body=null) {
  const opts = {method, headers:{"Content-Type":"application/json"}};
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  return r.json();
}

// ── Acciones ──────────────────────────────────────
async function agregarAlumno() {
  const ap=document.getElementById("new-ap").value.trim();
  const nm=document.getElementById("new-nm").value.trim();
  const dn=document.getElementById("new-dn").value.trim();
  if (!ap||!nm||!dn) { alert("Completá todos los campos."); return; }
  if (alumnos.find(a=>a.dni===dn)) { alert("Ya existe un alumno con ese DNI."); return; }

  if (modoDemo) {
    alumnos.push({apellido:ap,nombre:nm,dni:dn,presente:false,hora:null});
    render(); limpiarForm(); return;
  }
  badge("loading","Guardando…");
  try {
    const nuevos = [...alumnos.map(a=>({apellido:a.apellido,nombre:a.nombre,dni:a.dni})), {apellido:ap,nombre:nm,dni:dn}];
    const r = await api("/api/guardar","POST",{alumnos:nuevos});
    if (r.error) { alert("Error: "+r.error); return; }
    limpiarForm(); await cargar();
  } catch(e) { badge("err","Error"); errBox(e.message); }
}

function limpiarForm() {
  document.getElementById("new-ap").value="";
  document.getElementById("new-nm").value="";
  document.getElementById("new-dn").value="";
}

async function eliminarAlumno(i) {
  if (!confirm("¿Eliminar a "+alumnos[i].apellido+", "+alumnos[i].nombre+"?")) return;
  if (modoDemo) { alumnos.splice(i,1); render(); return; }
  badge("loading","Guardando…");
  try {
    const nuevos = alumnos.filter((_,j)=>j!==i).map(a=>({apellido:a.apellido,nombre:a.nombre,dni:a.dni}));
    const r = await api("/api/guardar","POST",{alumnos:nuevos});
    if (r.error) { alert("Error: "+r.error); return; }
    await cargar();
  } catch(e) { badge("err","Error"); }
}

async function borrarTodos() {
  if (!confirm("¿Borrar TODOS los alumnos?")) return;
  if (modoDemo) { alumnos=[]; render(); return; }
  badge("loading","Borrando…");
  try { await api("/api/guardar","POST",{alumnos:[]}); await cargar(); }
  catch(e) { badge("err","Error"); }
}

async function resetearAsistencia() {
  if (!confirm("¿Resetear toda la asistencia? Todos quedarán como Ausentes.")) return;
  if (modoDemo) { alumnos.forEach(a=>{a.presente=false;a.hora=null}); render(); return; }
  badge("loading","Reseteando…");
  try { await api("/api/resetear","POST",{}); await cargar(); }
  catch(e) { badge("err","Error"); }
}

// ── PDF ───────────────────────────────────────────
function descargarPDF() {
  if (!alumnos.length) { alert("No hay alumnos para descargar."); return; }
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF();
  const fecha=new Date().toLocaleDateString("es-AR");
  const pres=alumnos.filter(a=>a.presente).length;
  doc.setFont("helvetica","bold");doc.setFontSize(16);
  doc.text("Registro de Asistencia",14,18);
  doc.setFont("helvetica","normal");doc.setFontSize(9.5);doc.setTextColor(120);
  doc.text("Fecha: "+fecha+"   |   Total: "+alumnos.length+"   |   Presentes: "+pres+"   |   Ausentes: "+(alumnos.length-pres),14,26);
  doc.setTextColor(0);
  doc.autoTable({
    startY:32,
    head:[["#","Apellido/s","Nombre/s","DNI","Estado","Hora"]],
    body:alumnos.map((a,i)=>[i+1,a.apellido,a.nombre,a.dni,a.presente?"Presente":"Ausente",a.hora||"—"]),
    styles:{font:"helvetica",fontSize:9,cellPadding:3.5},
    headStyles:{fillColor:[20,20,28],textColor:240,fontStyle:"bold",fontSize:8.5},
    alternateRowStyles:{fillColor:[248,248,250]},
    columnStyles:{0:{cellWidth:10},3:{cellWidth:28,font:"courier"},4:{cellWidth:24},5:{cellWidth:16}},
    didDrawCell(d){
      if(d.section==="body"&&d.column.index===4){
        const v=d.cell.raw;
        doc.setFillColor(...(v==="Presente"?[46,204,113]:[255,71,87]));
        const{x,y,width:w,height:h}=d.cell;
        doc.roundedRect(x+2,y+2,w-4,h-4,2,2,"F");
        doc.setTextColor(255);doc.setFontSize(8);
        doc.text(v,x+w/2,y+h/2+0.9,{align:"center"});
        doc.setTextColor(0);doc.setFontSize(9);
      }
    }
  });
  doc.save("asistencia_"+fecha.replace(/\//g,"-")+".pdf");
}

// ── Excel ─────────────────────────────────────────
function descargarExcel() {
  if (!alumnos.length) { alert("No hay alumnos para descargar."); return; }
  const fecha=new Date().toLocaleDateString("es-AR");
  const ws=XLSX.utils.aoa_to_sheet([
    ["#","Apellido/s","Nombre/s","DNI","Estado","Hora"],
    ...alumnos.map((a,i)=>[i+1,a.apellido,a.nombre,a.dni,a.presente?"Presente":"Ausente",a.hora||""])
  ]);
  ws["!cols"]=[{wch:4},{wch:22},{wch:22},{wch:13},{wch:12},{wch:8}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Asistencia");
  XLSX.writeFile(wb,"asistencia_"+fecha.replace(/\//g,"-")+".xlsx");
}

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

// Auto-refresh cada 10s si hay servidor
setInterval(()=>{ if(!modoDemo) cargar(); }, 10000);

// Arranca
cargar();
</script>
</body>
</html>
