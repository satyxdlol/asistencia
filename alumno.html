<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Asistencia — IES N°11</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f11;--surface:#18181c;--border:#2e2e38;--accent:#e8ff47;--text:#f0f0f0;--muted:#666;--red:#ff4757;--green:#2ecc71;--font:'Syne',sans-serif;--mono:'DM Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2rem 1.75rem 2.25rem;width:100%;max-width:400px}
.logo{text-align:center;margin-bottom:2rem}
.logo img{width:72px;height:72px;object-fit:contain;margin-bottom:.85rem;display:block;margin-left:auto;margin-right:auto}
.logo h1{font-size:1.15rem;font-weight:800;letter-spacing:.02em;line-height:1.2}
.logo .inst{font-size:.75rem;font-family:var(--mono);color:var(--muted);margin-top:.3rem;letter-spacing:.06em;text-transform:uppercase}
.divider{height:1px;background:var(--border);margin:1.25rem 0}
.field{margin-bottom:1.1rem}
.field label{display:block;font-family:var(--mono);font-size:.68rem;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:.45rem}
.field input{width:100%;background:#111114;border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--font);font-size:1rem;padding:.7rem 1rem;outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(232,255,71,.1)}
.field input::placeholder{color:#3a3a3a}
.btn-submit{width:100%;background:var(--accent);color:#000;border:none;border-radius:12px;font-family:var(--font);font-size:1rem;font-weight:800;padding:.85rem;cursor:pointer;letter-spacing:.04em;text-transform:uppercase;margin-top:.5rem;transition:background .18s,transform .1s;-webkit-appearance:none;display:flex;align-items:center;justify-content:center;gap:.5rem}
.btn-submit:active{background:#cce026;transform:scale(.98)}
.btn-submit:disabled{background:#333;color:#666;cursor:not-allowed;transform:none}
.result{display:none;border-radius:12px;padding:1.1rem 1.2rem;margin-top:1.1rem;text-align:center;font-weight:700;font-size:.95rem;line-height:1.5}
.result.ok{background:rgba(46,204,113,.1);color:var(--green);border:1px solid rgba(46,204,113,.28)}
.result.err{background:rgba(255,71,87,.08);color:var(--red);border:1px solid rgba(255,71,87,.22)}
.spinner{width:20px;height:20px;border:3px solid rgba(0,0,0,.2);border-top-color:#000;border-radius:50%;animation:spin .7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

    <h1>Registrar Asistencia</h1>
    <div class="inst">IES N°11 · Jujuy - Argentina</div>
  </div>
  <div class="divider"></div>
  <div class="field">
    <label>Apellido/s</label>
    <input type="text" id="ap" placeholder="García López" autocomplete="family-name" inputmode="text" autocorrect="off" autocapitalize="words">
  </div>
  <div class="field">
    <label>Nombre/s</label>
    <input type="text" id="nm" placeholder="Juan Carlos" autocomplete="given-name" inputmode="text" autocorrect="off" autocapitalize="words">
  </div>
  <div class="field">
    <label>DNI</label>
    <input type="text" id="dn" placeholder="12345678" inputmode="numeric" maxlength="11" autocomplete="off">
  </div>
  <button class="btn-submit" id="btn-reg" onclick="registrar()">
    <span id="btn-txt">Registrar asistencia</span>
    <div class="spinner" id="spinner"></div>
  </button>
  <div class="result" id="result"></div>
</div>

<script>
async function registrar(){
  const ap=document.getElementById("ap").value.trim();
  const nm=document.getElementById("nm").value.trim();
  const dn=document.getElementById("dn").value.trim();
  if(!ap||!nm||!dn){mostrar("Completá todos los campos.",false);return}
  const btn=document.getElementById("btn-reg"),txt=document.getElementById("btn-txt"),sp=document.getElementById("spinner");
  btn.disabled=true;txt.style.display="none";sp.style.display="block";
  try{
    const r=await fetch("/api/registrar",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({apellido:ap,nombre:nm,dni:dn})});
    const d=await r.json();
    if(d.ok){mostrar("✓ Asistencia registrada\n"+d.apellido+", "+d.nombre+"\n"+d.hora,true);document.getElementById("ap").value="";document.getElementById("nm").value="";document.getElementById("dn").value="";}
    else mostrar(d.error||"Error al registrar.",false);
  }catch(e){mostrar("No se pudo conectar.\nVerificá tu conexión WiFi.",false);}
  finally{btn.disabled=false;txt.style.display="";sp.style.display="none"}
}
function mostrar(msg,ok){const el=document.getElementById("result");el.textContent=msg;el.className="result "+(ok?"ok":"err");el.style.display="block";if(ok)setTimeout(()=>{el.style.display="none"},7000)}
document.addEventListener("keydown",e=>{if(e.key==="Enter")registrar()});
</script>
</body>
